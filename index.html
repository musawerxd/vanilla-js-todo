<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla JS Todo</title>
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>

        <button id="musawerxd">
            <img src="images/linkedin.webp">
            <p>Built by musawerxd</p>
        </button>

        <div class="navRight">



            <button id="theme">☀ Light Mode</button>

        </div>

    </nav>


    <main class="todo">

        <h1>Organize Your Day</h1>

        <div class="newTask">

            <div class="inp">

                <input type="text" placeholder="Add a new task..." id="taskInput" maxlength="120" autocomplete="off">

                <button id="Addbtn">+ Add</button>

            </div>

        </div>

        <div class="filters">

            <button class="filterbtn active" data-filter="all">All</button>

            <button class="filterbtn" data-filter="active">Active</button>

            <button class="filterbtn" data-filter="completed">Completed</button>

        </div>

        <ul class="allTask" id="taskList">

            <!-- Empty state -->
            <!-- <li class="empty">
                ✏️ No tasks yet. Add one above!
            </li> -->

            <!-- Example Task -->
            <!-- <li class="task">

                <div class="taskLeft">
                    <button class="markbtn"></button>
                    <p class="tasktxt">Example Task</p>
                </div>

                <div class="taskRight">
                    <button class="edit">✎</button>
                    <button class="delete">✕</button>
                </div>

            </li> -->

        </ul>

        <div class="stats">

            <span id="statsText">
                0 total · 0 done · 0 left
            </span>

            <button id="clearBtn">
                Clear All
            </button>

        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>
